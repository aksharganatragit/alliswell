<div class="carousel">
  <div #track class="carousel__track" (scroll)="onScroll()" tabindex="0" [attr.aria-label]="alt + ' images'">
    @for (img of images; track $index) {
      <div class="carousel__slide">
        <!-- Placeholder icon; replace with <img [src]="img"> when real images land -->
        <app-icon [name]="img" [size]="120" [strokeWidth]="1.3"></app-icon>
      </div>
    }
  </div>

  @if (images.length > 1) {
    <button class="carousel__nav carousel__nav--prev" (click)="prev()" [disabled]="active() === 0" aria-label="Previous image">
      <app-icon name="chevron-left" [size]="22"></app-icon>
    </button>
    <button class="carousel__nav carousel__nav--next" (click)="next()" [disabled]="active() === images.length - 1" aria-label="Next image">
      <app-icon name="chevron-right" [size]="22"></app-icon>
    </button>

    <div class="carousel__dots" role="tablist" aria-label="Choose image">
      @for (img of images; track $index) {
        <button
          class="carousel__dot"
          [class.is-active]="active() === $index"
          (click)="goTo($index)"
          [attr.aria-label]="'Go to image ' + ($index + 1)"
          [attr.aria-selected]="active() === $index"
          role="tab"
        ></button>
      }
    </div>
  }
</div>
