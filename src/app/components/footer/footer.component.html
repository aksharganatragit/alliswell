<footer class="footer">
  <div class="container">
    <ul class="footer__trust">
      @for (t of trust; track t.title) {
        <li>
          <span class="footer__trust-icon"><app-icon [name]="t.icon" [size]="22"></app-icon></span>
          <span class="footer__trust-label">{{ t.title }}<br />{{ t.sub }}</span>
        </li>
      }
    </ul>

    <div class="footer__main">
      <div class="footer__brand">
        <app-brand-logo tone="light"></app-brand-logo>
        <p class="footer__addr">
          <app-icon name="map-pin" [size]="16"></app-icon>
          <span>{{ address }}</span>
        </p>
      </div>

      <nav class="footer__nav" aria-label="Footer">
        @for (link of links; track link.path) {
          <a [routerLink]="link.path">{{ link.label }}</a>
        }
      </nav>
    </div>

    <div class="footer__base">
      <span>© {{ year }} {{ 'All is well' }}, Rajkot.</span>
      <span class="footer__tag">Pure care for your family</span>
    </div>
  </div>
</footer>
